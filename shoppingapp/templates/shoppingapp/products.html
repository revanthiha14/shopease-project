<!DOCTYPE html>
<html>
<head>
    <title>ShopEase</title>
    <style>
        body{
            font-family: Arial;
            background:#f3f3f3;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            width:250px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        button{
            background:#ff9900;
            border:none;
            padding:10px;
            width:100%;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <h1>ShopEase - Smart Online Shopping</h1>

    <div class="container">
        {% for product in products %}
        <div class="card">
            <img src="{{ product.image_url }}">
            <h3>{{ product.name }}</h3>
            <p>₹ {{ product.price }}</p>
            <p>Stock: {{ product.stock }}</p>
            <button>Buy Now</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
