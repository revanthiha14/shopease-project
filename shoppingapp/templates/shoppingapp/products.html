<!DOCTYPE html>
<html>
<head>
    <title>ShopEase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-left: 20px;
        }

        h2 {
            margin-left: 20px;
            color: #444;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        button {
            background: #ff9900;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>ShopEase - Smart Online Shopping</h1>
    <h2>Welcome, {{ customer_name }} 👋</h2>

    <div class="container">
        {% for product in products %}
        <div class="card">
            <img src="{{ product.image_url }}">
            <h3>{{ product.name }}</h3>
            <p>₹ {{ product.price }}</p>
            <p>Stock: {{ product.stock }}</p>

            <a href="/buy/{{ product.product_id }}/">
                <button>Buy Now</button>
            </a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
