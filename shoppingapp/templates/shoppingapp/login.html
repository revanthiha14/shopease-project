<!DOCTYPE html>
<html>
<head>
    <title>Customer Login</title>
    <style>
        body{
            font-family: Arial;
            background:#f3f3f3;
        }

        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#ff9900;
            border:none;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Customer Login</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Enter Name" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <input type="text" name="location" placeholder="Delivery Address" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
